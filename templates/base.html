<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CodeCritique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
          <i class="bi bi-clipboard-check me-2"></i>CodeCritique
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                  <a class="nav-link" href="{{ url_for('index') }}">
                    <i class="bi bi-house me-1"></i>Home
                  </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="{{ url_for('guidelines') }}">
                    <i class="bi bi-book me-1"></i>Guidelines
                  </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="{{ url_for('summary') }}">
                    <i class="bi bi-graph-up me-1"></i>Summary
                  </a>
                </li>
              </ul>
        </div>
      </div>
    </nav>
    
    <main class="container my-4">
      {% block content %}{% endblock %}
    </main>
    
    <footer class="bg-dark text-light py-4 mt-5">
      <div class="container text-center">
        <p class="mb-0">CodeCritique - Code Review Tool</p>
      </div>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
