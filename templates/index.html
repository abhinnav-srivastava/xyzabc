{% extends 'base.html' %}

{% block content %}
<!-- Landing: not logged in -->
<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-8 text-center">
      <div class="py-5">
        <h1 class="display-4 fw-bold text-primary mb-3">Restore app name</h1>
        <p class="lead text-muted mb-4">
        code review tool with role-based checklists
        </p>
        <div class="d-grid gap-2 d-md-flex justify-content-md-center mb-5">
          <a href="{{ url_for('login', next=url_for('dashboard')) }}" class="btn btn-primary btn-lg px-4">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login to Start
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container mb-5">
  <div class="row g-4">
    <div class="col-md-4">
      <div class="text-center p-4">
        <div class="mb-3">
          <i class="bi bi-people text-primary" style="font-size: 2.5rem;"></i>
        </div>
        <h5 class="fw-semibold">Role-Based</h5>
        <p class="text-muted small">Tailored checklists for different roles</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="text-center p-4">
        <div class="mb-3">
          <i class="bi bi-list-check text-success" style="font-size: 2.5rem;"></i>
        </div>
        <h5 class="fw-semibold">Comprehensive</h5>
        <p class="text-muted small">Coverage across all review categories</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="text-center p-4">
        <div class="mb-3">
          <i class="bi bi-lightning text-warning" style="font-size: 2.5rem;"></i>
        </div>
        <h5 class="fw-semibold">Fast & Easy</h5>
        <p class="text-muted small">Streamlined review process</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
